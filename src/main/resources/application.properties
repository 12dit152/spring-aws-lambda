# Application Configuration
spring.application.name=lambda-hello

# Logging Configuration - Verbose for development
logging.level.root=OFF
logging.level.com.samardash=INFO
logging.config=classpath:logback/logback-spring.xml

# Jackson 3 Compatibility - use Jackson 2 defaults for smooth transition
spring.jackson.use-jackson2-defaults=true

# Active Profile
spring.profiles.active=local