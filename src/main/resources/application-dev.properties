# Development Configuration
spring.main.banner-mode=OFF

# AWS Parameter Store Configuration
spring.config.import=optional:aws-parameterstore:/lambda-hello/${spring.profiles.active}/

# Logging Configuration - Suppress specific logger in development
logging.level.com.samardash.logger.TransactionLogger=OFF

# Backend URL
backend.url=http://localhost:8081/api/v1/backend/dev
backend.api-key=dev-key