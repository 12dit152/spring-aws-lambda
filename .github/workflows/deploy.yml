name: Deploy Hello World Stack

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:  # enables manual trigger

permissions:
  id-token: write        # required for OIDC
  contents: read         # allows checkout

concurrency:
  group: deploy-hello-world
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # if: "!contains(github.event.head_commit.message, 'dependabot')"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build the JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::897729105223:role/GitHubOIDCDeployRole
          aws-region: eu-west-1

      - name: Deploy with SAM
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name spring-lambda-hello-world-stack \
            --s3-bucket shared-deployment-artifacts-897729105223-eu-west-1 \
            --s3-prefix spring-lambda-hello-world \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Health Check
        run: |
          echo "Waiting for API Gateway to propagate..."
          sleep 10
          
          echo "Running Health Check on the new version..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.samardash.com/actuator/health)
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health Check Failed! Status Code: $HTTP_STATUS"
            echo "Warning: SAM has already shifted traffic to the new version. Rollback required."
            exit 1
          else
            echo "Health Check Passed! Status Code: $HTTP_STATUS"
          fi

      - name: Cleanup S3 and Old Lambda Versions
        if: success()
        run: |
          echo "Cleaning up old Lambda versions..."
          
          LIVE_VERSION=$(aws lambda get-alias \
            --function-name spring-lambda-hello-world \
            --name dev \
            --query 'FunctionVersion' --output text || echo "")
            
          if [ -n "$LIVE_VERSION" ]; then
            aws lambda list-versions-by-function \
              --function-name spring-lambda-hello-world \
              --query 'Versions[?Version!=`$LATEST`].Version' \
              --output text | \
            tr '\t' '\n' | \
            while read old_version; do
              if [ "$old_version" != "$LIVE_VERSION" ] && [ -n "$old_version" ]; then
                echo "Deleting Lambda version: $old_version"
                aws lambda delete-function \
                  --function-name spring-lambda-hello-world:$old_version || true
              fi
            done
          fi
          
          echo "Cleaning up S3 staging area..."
          aws s3 rm s3://shared-deployment-artifacts-897729105223-eu-west-1/spring-lambda-hello-world/ --recursive || true
          
          echo "Setting CloudWatch Log retention to 1 day..."
          aws logs put-retention-policy --log-group-name /aws/lambda/spring-lambda-hello-world --retention-in-days 1 || true
